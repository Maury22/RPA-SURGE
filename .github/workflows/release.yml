name: Build y Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: Parchar bug de firma en electron-builder
        shell: pwsh
        run: |
          $file = "node_modules/app-builder-lib/out/codeSign/windowsCodeSign.js"
          $content = Get-Content $file -Raw
          $patched = $content -replace "(async function doSign\(configuration, packager\) \{)", '$1 if (!configuration) return;'
          Set-Content $file $patched

      - name: Compilar y publicar release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
