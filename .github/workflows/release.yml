name: Build y Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: Parchar bug de firma en electron-builder
        shell: pwsh
        run: |
          $jsFile = "node_modules/app-builder-lib/out/codeSign/windowsCodeSign.js"
          $tsFile = "node_modules/app-builder-lib/src/codeSign/windowsCodeSign.ts"
          foreach ($f in @($jsFile, $tsFile)) {
            if (Test-Path $f) {
              $c = Get-Content $f -Raw
              $patched = $c.Replace('"file" in configuration', 'null != configuration && "file" in configuration')
              Set-Content $f $patched
              Write-Host "Parcheado: $f"
            }
          }

      - name: Compilar y publicar release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
