name: Build y Publicar Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'package.json'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Descargar Poppler para Windows
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/oschwartz10612/poppler-windows/releases/download/v25.12.0-0/Release-25.12.0-0.zip" -OutFile poppler.zip
          Expand-Archive -Path poppler.zip -DestinationPath poppler_tmp
          Move-Item poppler_tmp/poppler-25.12.0 poppler
          Remove-Item poppler.zip, poppler_tmp -Recurse -Force

      - name: Parchar electron-builder (skip firma de codigo)
        shell: pwsh
        run: |
          $jsFile = "node_modules/app-builder-lib/out/winPackager.js"
          $original = 'const cscInfoForCacheDigest = !(0, flags_1.isBuildCacheEnabled)() || isCI || config.electronDist != null ? null : await (await this.signtoolManager.value).cscInfo.value;'
          $patched  = 'const cscInfoForCacheDigest = null; // patched: skip cert read'
          $c = Get-Content $jsFile -Raw
          if ($c -match [regex]::Escape($original)) {
            Set-Content $jsFile $c.Replace($original, $patched)
            Write-Host "winPackager.js parcheado OK"
          } else {
            Write-Host "winPackager.js ya estaba parcheado o cambio de version"
          }

          $jsFile2 = "node_modules/app-builder-lib/out/codeSign/windowsCodeSign.js"
          if (Test-Path $jsFile2) {
            $c2 = Get-Content $jsFile2 -Raw
            $c2patched = $c2.Replace('"file" in configuration', 'null != configuration && "file" in configuration')
            Set-Content $jsFile2 $c2patched
            Write-Host "windowsCodeSign.js parcheado OK"
          }

      - name: Build y publicar en GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          EP_DRAFT: false
          EP_PRE_RELEASE: false
        run: npx electron-builder --win --publish always
